name: Propagate to Clients

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: github.repository == 'emrekaradag12/core'
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PROPAGATION_TOKEN }}

      - id: set-matrix
        run: |
          matrix=$(cat .github/clients.json | jq -c '.')
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  propagate:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        client: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PROPAGATION_TOKEN }}

      - name: Run propagation script
        env:
          GH_TOKEN: ${{ secrets.PROPAGATION_TOKEN }}
        run: |
          chmod +x .github/scripts/propagate.sh
          .github/scripts/propagate.sh \
            "${{ matrix.client.repo }}" \
            "${{ matrix.client.branch }}" \
            "emrekaradag12/core" \
            "${{ secrets.PROPAGATION_TOKEN }}"